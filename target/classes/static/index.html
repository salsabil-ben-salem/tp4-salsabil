<!DOCTYPE html>
<html>
<head>
    <title>Boutique Test</title>
</head>
<body>
    <h1>Ordinateur Portable</h1>
    <button id="add-to-cart-btn" onclick="add()">Ajouter au panier</button>
    <p>Panier: <span id="cart-count">0</span></p>

    <script>
        function add() {
            document.getElementById('cart-count').innerText = "1";
        }
    </script>
</body>
</html>
